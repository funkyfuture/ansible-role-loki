- name: create loki system group
  group:
    name: "{{ loki_system_group }}"
    system: true
    state: present

- name: create loki system user
  user:
    name: "{{ loki_system_user }}"
    system: true
    shell: "/usr/sbin/nologin"
    group: "{{ loki_system_group }}"
    createhome: false

- name: get current loki version
  shell: loki --version | head -n1 | cut -d " " -f 3
  register: current_loki_version
  changed_when: false

- block:
    - name: download and unzip loki binary
      unarchive:
        src: https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip
        remote_src: yes
        dest: /usr/local/bin
    - name: rename new loki binary
      command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
    - name: set loki binary ownership and permissions
      file:
        path: /usr/local/bin/loki
        owner: "{{ loki_system_user }}"
        group: "{{ loki_system_group }}"
        mode: u=rx
      notify: enable and restart loki
  when: current_loki_version.stdout != loki_version

- block:
  - name: download and unzip logcli binary
    unarchive:
      src: https://github.com/grafana/loki/releases/download/v{{ loki_version }}/logcli-linux-amd64.zip
      remote_src: yes
      dest: /usr/local/bin
  - name: rename new logcli binary
    command: mv /usr/local/bin/logcli-linux-amd64 /usr/local/bin/logcli
  - name: set logcli binary ownership and permissions
    file:
      path: /usr/local/bin/logcli
      owner: root
      group: root
      mode: ug=rx
  when: loki_install_logcli and current_loki_version.stdout != loki_version

- name: pre-create loki folders
  file:
    name: "{{ loki_directories }}"
    state: directory
    owner: "{{ loki_system_user }}"
    group: "{{ loki_system_group }}"

- name: configure loki
  template:
    src: loki.yml.j2
    dest: /etc/loki.yml
    owner: root
    group: root
    mode: 0644
  notify:
    - enable and restart loki

- name: create systemd service unit
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: 0644
  notify:
    - enable and restart loki
